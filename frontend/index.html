<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF6EC" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>2Gather — Pray together, wherever you are</title>
    <meta
      name="description"
      content="A faith-based togetherness app: real-time prayer chat, themed Bible verses, and life-situation modes that bring Scripture and prayer to the moment you're in."
    />
    <link rel="canonical" href="https://2gather.vercel.app/" />

    <!-- Open Graph / social link previews. NOTE: og-image.png is a v1 (the brand
         mark) — replace with a designed 1200x630 social card before launch. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="2Gather" />
    <meta property="og:url" content="https://2gather.vercel.app/" />
    <meta property="og:title" content="2Gather — Pray together, wherever you are" />
    <meta
      property="og:description"
      content="Real-time prayer chat, themed Bible verses, and life-situation modes that meet the moment you're in. You were never meant to pray alone."
    />
    <meta property="og:image" content="https://2gather.vercel.app/og-image.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="2Gather — Pray together, wherever you are" />
    <meta
      name="twitter:description"
      content="Real-time prayer chat, themed Bible verses, and life-situation modes. You were never meant to pray alone."
    />
    <meta name="twitter:image" content="https://2gather.vercel.app/og-image.png" />

    <!-- Entity schema for search/LLM crawlers. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "2Gather",
        "url": "https://2gather.vercel.app",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "description": "A faith-based togetherness app: real-time prayer chat, themed Bible verses, and life-situation modes that bring Scripture and prayer to the moment you're in.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "about": ["Christian prayer", "Bible verses", "faith community"],
        "publisher": {
          "@type": "Organization",
          "name": "2Gather",
          "logo": "https://2gather.vercel.app/og-image.png"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Raleway = body; Lora = display/headings (warm, reverent — UI/UX Pro Max) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Raleway:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
