name: Deploy

# Frontend (Vercel) and backend (Render) both auto-deploy from their OWN Git
# integrations on push to `main` — nothing to do here for those:
#   • Vercel: connect the repo, set Root Directory = frontend (uses frontend/vercel.json)
#   • Render: render.yaml has autoDeploy: true
#
# This workflow only syncs Firestore security rules + indexes, which neither
# platform deploys. It runs solely when those files change.
#   Required repo secret: FIREBASE_SERVICE_ACCOUNT (the gather-bd64a service-account JSON).
on:
  push:
    branches: [main]
    paths:
      - "firebase/**"
      - "firebase.json"

jobs:
  firestore-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy Firestore rules + indexes
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping Firestore rules deploy."
            exit 0
          fi
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools deploy \
            --only firestore:rules,firestore:indexes \
            --project gather-bd64a \
            --non-interactive
